<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Fi Calling | Zeabur</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; height: 100vh; }
        .phone-shell { width: 100%; max-width: 450px; background: white; display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { background: var(--primary); color: white; padding: 25px 20px; text-align: center; }
        .nav { display: flex; background: #fff; border-top: 1px solid #e2e8f0; }
        .nav button { flex: 1; padding: 15px; border: none; background: none; font-weight: 600; color: #64748b; cursor: pointer; transition: 0.3s; }
        .nav button.active { color: var(--primary); border-top: 3px solid var(--primary); }
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        .page { display: none; }
        .active-page { display: block; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-call { background: #22c55e; color: white; }
        .btn-hangup { background: #ef4444; color: white; }
        .btn-google { background: white; border: 1px solid #cbd5e1; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .card { background: #f1f5f9; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="login-page" class="phone-shell" style="justify-content: center; align-items: center; padding: 20px;">
    <h2>Wi-Fi Calling</h2>
    <p>Connect with your Gmail account</p>
    <button class="btn btn-google" onclick="login()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa/google.svg" width="20"> Login with Google
    </button>
</div>

<div id="app-page" class="phone-shell" style="display:none;">
    <div class="header">
        <div id="my-id-tag" style="font-size: 0.8rem; opacity: 0.8;">YOUR ID</div>
        <div id="my-number" style="font-size: 1.5rem; font-weight: bold;">------</div>
    </div>

    <div class="content">
        <div id="page-dialer" class="page active-page">
            <input type="text" id="target-id" placeholder="Enter Recipient's ID">
            <button class="btn btn-call" id="call-btn" onclick="makeCall()">📞 Start Call</button>
            <button class="btn btn-hangup" id="hangup-btn" style="display:none;" onclick="endCall()">End Call</button>
            <p id="status" style="text-align:center; color: #64748b; margin-top: 20px;">Ready to call</p>
        </div>

        <div id="page-contacts" class="page">
            <h3>Contacts</h3>
            <div id="contact-list"></div>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <input type="text" id="c-name" placeholder="Name">
            <input type="text" id="c-id" placeholder="ID">
            <button class="btn" style="background: var(--primary); color: white;" onclick="saveContact()">Save Contact</button>
        </div>

        <div id="page-logs" class="page">
            <h3>Recent Calls</h3>
            <div id="log-list"></div>
        </div>
    </div>

    <nav class="nav">
        <button onclick="switchTab('page-dialer', this)" class="active">Dial</button>
        <button onclick="switchTab('page-contacts', this)">Contacts</button>
        <button onclick="switchTab('page-logs', this)">Logs</button>
    </nav>
</div>

<audio id="remoteAudio" autoplay></audio>

<script>
// --- CONFIGURATION ---
const firebaseConfig = {
    apiKey: "AIzaSyD9jnNp-kcshsCuzUGiOrSIz50UlnMg598",
    authDomain: "wi-fi-calling-sp.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "wi-fi-calling-sp",
    storageBucket: "wi-fi-calling-sp.firebasestorage.app",
    messagingSenderId: "832118614599",
    appId: "1:832118614599:web:a80ea7643d080f6f1cdf62"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let myID, pc, localStream;
const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

// --- AUTH ---
function login() {
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

auth.onAuthStateChanged(user => {
    if (user) {
        myID = user.uid.substring(0, 6).toUpperCase();
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('app-page').style.display = 'flex';
        document.getElementById('my-number').innerText = myID;
        listenForCalls();
        renderContacts();
        renderLogs();
    }
});

// --- TABS ---
function switchTab(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active-page');
    el.classList.add('active');
}

// --- CALLING LOGIC ---
async function makeCall() {
    const dest = document.getElementById('target-id').value;
    if(!dest) return;

    pc = new RTCPeerConnection(config);
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

    pc.onicecandidate = e => { if(e.candidate) db.ref(`calls/${dest}/ice`).push(e.candidate); };
    pc.ontrack = e => document.getElementById('remoteAudio').srcObject = e.streams[0];

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    db.ref(`calls/${dest}`).set({ offer, from: myID });

    document.getElementById('status').innerText = "Calling...";
    document.getElementById('call-btn').style.display = 'none';
    document.getElementById('hangup-btn').style.display = 'block';

    db.ref(`calls/${dest}/answer`).on('value', async s => {
        if(s.val() && !pc.currentRemoteDescription) {
            await pc.setRemoteDescription(new RTCSessionDescription(s.val()));
            saveLog(`Outgoing to ${dest}`);
        }
    });
}

function listenForCalls() {
    db.ref(`calls/${myID}`).on('value', async s => {
        const data = s.val();
        if(data && data.offer && !pc) {
            if(confirm(`Incoming call from ${data.from}?`)) {
                pc = new RTCPeerConnection(config);
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

                pc.onicecandidate = e => { if(e.candidate) db.ref(`calls/${data.from}/answerIce`).push(e.candidate); };
                pc.ontrack = e => document.getElementById('remoteAudio').srcObject = e.streams[0];

                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                db.ref(`calls/${myID}/answer`).set(answer);
                
                document.getElementById('hangup-btn').style.display = 'block';
                saveLog(`Incoming from ${data.from}`);
            }
        }
    });
}

function endCall() { location.reload(); }

// --- STORAGE ---
function saveContact() {
    const contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
    contacts.push({ name: document.getElementById('c-name').value, id: document.getElementById('c-id').value });
    localStorage.setItem('contacts', JSON.stringify(contacts));
    renderContacts();
}

function renderContacts() {
    const list = JSON.parse(localStorage.getItem('contacts') || '[]');
    document.getElementById('contact-list').innerHTML = list.map(c => `
        <div class="card"><b>${c.name}</b> <span>${c.id}</span></div>
    `).join('');
}

function saveLog(msg) {
    const logs = JSON.parse(localStorage.getItem('logs') || '[]');
    logs.unshift(`${msg} - ${new Date().toLocaleTimeString()}`);
    localStorage.setItem('logs', JSON.stringify(logs.slice(0, 10)));
    renderLogs();
}

function renderLogs() {
    const logs = JSON.parse(localStorage.getItem('logs') || '[]');
    document.getElementById('log-list').innerHTML = logs.map(l => `<div class="card">${l}</div>`).join('');
}
</script>
</body>
</html>
